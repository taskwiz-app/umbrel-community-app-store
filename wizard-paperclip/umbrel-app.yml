name: Paperclip
version: "2026.416.0"

tagline: Open-Source-Orchestrierung für autonome KI-Unternehmen
description: >-
  Paperclip ist eine self-hosted Plattform, die ein Team von KI-Agenten
  orchestriert, um ein Unternehmen zu betreiben. Du kannst eigene Agenten
  (Claude, Codex, Cursor u.a.) einbinden, Ziele definieren und Arbeit
  sowie Kosten über ein zentrales Dashboard verwalten. Mit Organigrammen,
  Budgets, Governance und Ticket-System – alles bequem im Browser auf
  deinem Umbrel-Server.

